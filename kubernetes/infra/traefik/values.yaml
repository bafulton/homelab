namespace: traefik

# Tailscale OAuth credentials for automated auth key generation
# These credentials are used by the pre-install hook to generate auth keys
bitwarden-secret:
  secrets:
    - name: tailscale-oauth
      data:
        client_id: "0444abc5-ca33-41a7-a90d-b3c70174b122"
        client_secret: "8a0781d1-8c35-42f9-8b6b-b3c70174c7e6"

# Persistent storage for Tailscale device state
# Preserves device identity across pod restarts
longhorn-storage:
  pvcs:
    - name: traefik-tailscale-state
      size: 1Gi
      storageClass: longhorn-emmc
      accessMode: ReadWriteOnce

tailscale-ingress:
  ingresses:
    - name: tailscale
      hostname: traefik-dashboard
      service:
        create: true
        targetPort: 8080
        targetSelector:
          app.kubernetes.io/instance: traefik-traefik
          app.kubernetes.io/name: traefik

traefik:
  # A complete list of values can be found here:
  # https://github.com/traefik/traefik-helm-chart/blob/master/traefik/values.yaml
  #
  # Useful examples here:
  # https://github.com/traefik/traefik-helm-chart/blob/master/EXAMPLES.md

  priorityClassName: "system-cluster-critical"

  # Prometheus annotations for auto-discovery by signoz-k8s-infra
  deployment:
    podAnnotations:
      prometheus.io/scrape: "true"
      prometheus.io/port: "9100"

  # MetalLB LoadBalancer IP (from pool 192.168.0.200-250)
  service:
    annotations:
      metallb.io/loadBalancerIPs: "192.168.0.200"

  additionalArguments:
    # Expose dashboard without TLS - safe because it's behind Tailscale Ingress
    # which provides HTTPS termination. Do not expose directly to internet.
    - "--api.insecure=true"

  # Enable metrics endpoint
  metrics:
    prometheus:
      service:
        enabled: true
