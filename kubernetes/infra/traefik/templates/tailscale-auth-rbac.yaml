apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ .Release.Name }}-tailscale-keygen
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ .Release.Name }}-tailscale-keygen
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["create", "get", "patch", "update"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ .Release.Name }}-tailscale-keygen
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ .Release.Name }}-tailscale-keygen
subjects:
  - kind: ServiceAccount
    name: {{ .Release.Name }}-tailscale-keygen
    namespace: {{ .Release.Namespace }}
