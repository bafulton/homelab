apiVersion: batch/v1
kind: Job
metadata:
  name: {{ .Release.Name }}-tailscale-auth-keygen
spec:
  template:
    spec:
      serviceAccountName: {{ .Release.Name }}-tailscale-keygen
      restartPolicy: OnFailure
      containers:
      - name: generate-auth-key
        # renovate: datasource=docker depName=alpine
        image: alpine:3.21
        command: [/bin/sh, -c]
        args:
          - |
            set -e

            # Install dependencies
            apk add --no-cache curl jq kubectl

            echo "Waiting for Tailscale OAuth credentials..."

            # Wait for ESO to sync OAuth credentials with exponential backoff
            ATTEMPT=0
            MAX_ATTEMPTS=10
            while [ $ATTEMPT -lt $MAX_ATTEMPTS ]; do
              # Try to read OAuth credentials from secret
              TS_OAUTH_CLIENT_ID=$(kubectl get secret tailscale-oauth -n {{ .Release.Namespace }} -o jsonpath='{.data.client_id}' 2>/dev/null | base64 -d)
              TS_OAUTH_CLIENT_SECRET=$(kubectl get secret tailscale-oauth -n {{ .Release.Namespace }} -o jsonpath='{.data.client_secret}' 2>/dev/null | base64 -d)

              if [ -n "$TS_OAUTH_CLIENT_ID" ] && [ -n "$TS_OAUTH_CLIENT_SECRET" ]; then
                echo "OAuth credentials found"
                break
              fi
              SLEEP=$((2 ** ATTEMPT))
              echo "Attempt $ATTEMPT: Credentials not ready, waiting ${SLEEP}s..."
              sleep $SLEEP
              ATTEMPT=$((ATTEMPT + 1))
            done

            if [ -z "$TS_OAUTH_CLIENT_ID" ] || [ -z "$TS_OAUTH_CLIENT_SECRET" ]; then
              echo "ERROR: Tailscale OAuth credentials not found after $MAX_ATTEMPTS attempts"
              exit 1
            fi

            echo "Generating Tailscale auth key..."

            # Generate auth key via Tailscale API
            # Try simplest possible request first
            HTTP_CODE=$(curl -s -w "%{http_code}" -o /tmp/response.json \
              -u "$TS_OAUTH_CLIENT_ID:$TS_OAUTH_CLIENT_SECRET" \
              -H "Content-Type: application/json" \
              -X POST \
              https://api.tailscale.com/api/v2/tailnet/catfish-mountain.ts.net/keys \
              -d '{"capabilities":{"devices":{"create":{"reusable":false,"ephemeral":false}}}}')

            if [ "$HTTP_CODE" != "200" ]; then
              echo "ERROR: Tailscale API returned HTTP $HTTP_CODE"
              echo "Response:"
              cat /tmp/response.json
              exit 1
            fi

            RESPONSE=$(cat /tmp/response.json)

            AUTH_KEY=$(echo $RESPONSE | jq -r '.key')

            if [ -z "$AUTH_KEY" ] || [ "$AUTH_KEY" = "null" ]; then
              echo "ERROR: Failed to extract auth key from API response"
              echo "Response: $RESPONSE"
              exit 1
            fi

            echo "Auth key generated successfully"
            echo "Creating/updating secret..."

            # Create or update secret with auth key
            kubectl create secret generic {{ .Release.Name }}-tailscale-auth \
              --namespace={{ .Release.Namespace }} \
              --from-literal=TS_AUTHKEY=$AUTH_KEY \
              --dry-run=client -o yaml | kubectl apply -f -

            echo "Secret {{ .Release.Name }}-tailscale-auth created/updated successfully"
