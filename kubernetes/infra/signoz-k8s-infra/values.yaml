namespace: signoz

k8s-infra:
  clusterName: homelab

  # Send metrics to the existing SigNoz OTel collector
  otelCollectorEndpoint: http://signoz-otel-collector.signoz:4318
  otelInsecure: true

  presets:
    # Collect container logs from all pods
    logsCollection:
      enabled: true
      operators:
        - id: container-parser
          type: container
        # Parse JSON log bodies and extract severity
        - type: json_parser
          if: 'body matches "^\\s*\\{"'
          parse_to: attributes
          on_error: send_quiet
          severity:
            parse_from: attributes.level
            preset: default
        # Strip [identifier] prefix from Longhorn-style prefixed logfmt logs so the
        # key_value_parser below can match. Covers both [pvc-id] and [longhorn-instance-manager].
        - type: regex_parser
          if: 'body matches "^\\[[^\\]]+\\] time=\""'
          regex: '^\[[^\]]+\] (?P<logfmt_content>.+)'
          parse_to: attributes
          on_error: send_quiet
        - type: move
          from: attributes.logfmt_content
          to: body
          on_error: send_quiet
        # Parse logrus logfmt logs (ArgoCD, Longhorn, etc.) and extract severity
        - type: key_value_parser
          if: 'body matches "^time=\""'
          parse_from: body
          parse_to: attributes
          on_error: send_quiet
        - type: severity_parser
          if: 'body matches "^time=\""'
          parse_from: attributes.level
          preset: default
          on_error: send_quiet
        # Parse Python logging format: YYYY-MM-DD HH:MM:SS.mmm LEVEL (thread)
        # Handles ANSI-colored logs (e.g., Home Assistant integrations)
        - type: regex_parser
          if: 'body matches "\\d{4}-\\d{2}-\\d{2} \\d{2}:\\d{2}:\\d{2}\\.\\d+ [A-Z]+ \\("'
          regex: '\d{4}-\d{2}-\d{2} \d{2}:\d{2}:\d{2}\.\d+ (?P<level>[A-Z]+) \('
          parse_to: attributes
          on_error: send_quiet
          severity:
            parse_from: attributes.level
            preset: default
        # Replace raw JSON/logfmt body with the human-readable message field.
        # Try "message" first (lower priority), then "msg" (wins if both exist).
        # on_error: send_quiet means the operator is a no-op when the field doesn't exist.
        - type: move
          from: attributes.message
          to: body
          on_error: send_quiet
        - type: move
          from: attributes.msg
          to: body
          on_error: send_quiet

    # Enable host metrics (CPU, memory, disk, network per node)
    hostMetrics:
      enabled: true

    # Enable kubelet metrics (pod/container resource usage)
    kubeletMetrics:
      enabled: true

    # Enable cluster-level metrics (node conditions, allocatable resources)
    clusterMetrics:
      enabled: true

    # Enable Kubernetes events
    kubernetesEvents:
      enabled: true

    # Enable Prometheus scraping via annotation-based discovery
    # Services with prometheus.io/scrape: "true" annotation will be auto-discovered
    prometheus:
      enabled: true
      annotationsPrefix: prometheus.io

  otelAgent:
    config:
      processors:
        transform/normalize_severity:
          log_statements:
            - context: log
              statements:
                # Assign severity_number for text values stanza's default preset doesn't recognize
                - set(severity_number, 9) where severity_text == "Information"
                - set(severity_number, 9) where severity_text == "Normal"
                - set(severity_number, 13) where severity_text == "Warning"
                # Normalize severity_text to canonical OTel values based on severity_number
                - set(severity_text, "Trace") where severity_number >= 1 and severity_number <= 4
                - set(severity_text, "Debug") where severity_number >= 5 and severity_number <= 8
                - set(severity_text, "Info") where severity_number >= 9 and severity_number <= 12
                - set(severity_text, "Warn") where severity_number >= 13 and severity_number <= 16
                - set(severity_text, "Error") where severity_number >= 17 and severity_number <= 20
                - set(severity_text, "Fatal") where severity_number >= 21
            - context: resource
              statements:
                # Derive service.name from k8s workload name when not already set
                - set(attributes["service.name"], attributes["k8s.deployment.name"]) where attributes["service.name"] == nil and attributes["k8s.deployment.name"] != nil
                - set(attributes["service.name"], attributes["k8s.statefulset.name"]) where attributes["service.name"] == nil and attributes["k8s.statefulset.name"] != nil
                - set(attributes["service.name"], attributes["k8s.daemonset.name"]) where attributes["service.name"] == nil and attributes["k8s.daemonset.name"] != nil
      service:
        pipelines:
          logs:
            processors:
              - transform/normalize_severity
              - batch

  otelDeployment:
    config:
      processors:
        transform/normalize_severity:
          log_statements:
            - context: log
              statements:
                # Assign severity_number for text values stanza's default preset doesn't recognize
                - set(severity_number, 9) where severity_text == "Information"
                - set(severity_number, 9) where severity_text == "Normal"
                - set(severity_number, 13) where severity_text == "Warning"
                # Normalize severity_text to canonical OTel values based on severity_number
                - set(severity_text, "Trace") where severity_number >= 1 and severity_number <= 4
                - set(severity_text, "Debug") where severity_number >= 5 and severity_number <= 8
                - set(severity_text, "Info") where severity_number >= 9 and severity_number <= 12
                - set(severity_text, "Warn") where severity_number >= 13 and severity_number <= 16
                - set(severity_text, "Error") where severity_number >= 17 and severity_number <= 20
                - set(severity_text, "Fatal") where severity_number >= 21
            - context: resource
              statements:
                # Derive service.name from k8s workload name when not already set
                - set(attributes["service.name"], attributes["k8s.deployment.name"]) where attributes["service.name"] == nil and attributes["k8s.deployment.name"] != nil
                - set(attributes["service.name"], attributes["k8s.statefulset.name"]) where attributes["service.name"] == nil and attributes["k8s.statefulset.name"] != nil
                - set(attributes["service.name"], attributes["k8s.daemonset.name"]) where attributes["service.name"] == nil and attributes["k8s.daemonset.name"] != nil
      service:
        pipelines:
          logs:
            processors:
              - transform/normalize_severity
              - batch
