namespace: metallb

# IP pool for LoadBalancer services. Customize for your network:
# - Must be in your LAN subnet
# - Must not overlap with DHCP range or other static IPs
# - These IPs are announced via ARP (Layer 2 mode)
pool:
  name: default-pool
  addresses:
    - "192.168.1.200-192.168.1.250"

advertisement:
  name: default
  ipAddressPools:
    - default-pool

metallb:
  # A complete list of values can be found here:
  # https://github.com/metallb/metallb/blob/main/charts/metallb/values.yaml

  controller:
    resources:
      requests:
        memory: 64Mi
        cpu: 10m
      limits:
        memory: 128Mi

  speaker:
    logLevel: info
    resources:
      requests:
        memory: 48Mi
        cpu: 10m
      limits:
        memory: 128Mi
    frr:
      enabled: false
    # Allow MetalLB to announce from control plane nodes
    # (Talos adds exclude-from-external-load-balancers label by default)
    ignoreExcludeLB: true

  frr-k8s:
    frrk8s:
      resources:
        requests:
          memory: 128Mi
          cpu: 15m
        limits:
          memory: 256Mi
