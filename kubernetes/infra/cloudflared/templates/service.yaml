apiVersion: v1
kind: Service
metadata:
  name: cloudflared-metrics
  labels:
    app: cloudflared
  annotations:
    prometheus.io/scrape: "true"
    prometheus.io/port: "2000"
    prometheus.io/path: "/metrics"
spec:
  selector:
    app: cloudflared
  ports:
    - name: metrics
      port: 2000
      targetPort: metrics
