apiVersion: apps/v1
kind: Deployment
metadata:
  name: cloudflared
spec:
  replicas: {{ .Values.cloudflared.replicas }}
  selector:
    matchLabels:
      app: cloudflared
  template:
    metadata:
      labels:
        app: cloudflared
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "2000"
        prometheus.io/path: "/metrics"
    spec:
      containers:
        - name: cloudflared
          image: {{ .Values.cloudflared.image }}
          args:
            - tunnel
            - --metrics
            - 0.0.0.0:2000
            - --protocol
            - quic
            - run
            - --token
            - $(TUNNEL_TOKEN)
          env:
            - name: TUNNEL_TOKEN
              valueFrom:
                secretKeyRef:
                  name: tunnel-credentials
                  key: token
          ports:
            - name: metrics
              containerPort: 2000
          # Cloudflare recommends a liveness probe (not readiness) on /ready.
          # If the tunnel loses connection, the pod should restart, not just
          # leave the endpoint pool — readiness would only do the latter.
          livenessProbe:
            httpGet:
              path: /ready
              port: metrics
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 1
          resources:
            requests:
              cpu: 10m
              memory: 64Mi
