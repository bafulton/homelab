namespace: smartctl-exporter

prometheus-smartctl-exporter:
  # Use community multi-arch image (official image is amd64-only)
  # https://github.com/prometheus-community/smartctl_exporter/issues/105
  image:
    repository: ghcr.io/joryirving/smartctl_exporter
    tag: 0.14.0

  # Prometheus annotations for auto-discovery by signoz-k8s-infra
  podAnnotations:
    prometheus.io/scrape: "true"
    prometheus.io/port: "9633"

  # Collect SMART data every 30 minutes. The exporter blocks its HTTP handler
  # during smartctl runs; beelink has 10 USB drives and the full scan takes
  # ~14 minutes, which exceeds the OTel scrape timeout (~6 min). Setting the
  # interval to 30 min keeps the cache warm for long enough that OTel scrapes
  # reliably hit cached data between collections.
  # This maps to --smartctl.interval in the binary.
  common:
    config:
      collect_not_more_than_period: 1800s

  # Tolerate all taints to run on all nodes
  tolerations:
    - effect: NoSchedule
      operator: Exists
