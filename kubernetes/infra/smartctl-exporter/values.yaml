namespace: smartctl-exporter

prometheus-smartctl-exporter:
  # Use community multi-arch image (official image is amd64-only)
  # https://github.com/prometheus-community/smartctl_exporter/issues/105
  image:
    repository: ghcr.io/joryirving/smartctl_exporter
    tag: 0.14.0

  # Prometheus annotations for auto-discovery by signoz-k8s-infra
  podAnnotations:
    prometheus.io/scrape: "true"
    prometheus.io/port: "9633"

  # Collect SMART data every 5 minutes (default: 120s). The exporter blocks
  # its HTTP handler during smartctl runs; sda on beelink is slow enough to
  # exceed the OTel scrape timeout (10s) at the default 120s interval.
  # This maps to --smartctl.interval in the binary.
  common:
    config:
      collect_not_more_than_period: 300s

  # Tolerate all taints to run on all nodes
  tolerations:
    - effect: NoSchedule
      operator: Exists
