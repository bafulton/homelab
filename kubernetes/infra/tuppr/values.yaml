namespace: tuppr

# Talos/Kubernetes versions for upgrades - Renovate updates these alongside talconfig.yaml
talosVersion: v1.13.0
kubernetesVersion: v1.36.0

talos:
  # Disable automated Talos upgrades until rpi5 is officially supported
  # When false, Renovate still updates talosVersion but tuppr won't auto-upgrade
  supportsRpi5: false

kubernetes:
  # Disable K8s upgrade CRD until rpi5 is on Talos v1.13.0+
  # Talos v1.11.5 (rpi5) caps at K8s v1.34.x - incompatible with v1.35+
  # Re-enable once rpi5 is migrated to official Talos image
  upgradeEnabled: false

# Tuppr manages Talos and Kubernetes upgrades via CRDs
# After deployment, create TalosUpgrade or KubernetesUpgrade resources to trigger upgrades
#
# Example TalosUpgrade:
#   apiVersion: upgrade.tuppr.io/v1alpha1
#   kind: TalosUpgrade
#   metadata:
#     name: talos-upgrade
#   spec:
#     talos:
#       version: v1.13.0
#
# Example KubernetesUpgrade:
#   apiVersion: upgrade.tuppr.io/v1alpha1
#   kind: KubernetesUpgrade
#   metadata:
#     name: kubernetes-upgrade
#   spec:
#     kubernetes:
#       version: v1.35.0

tuppr:
  # A complete list of values can be found here:
  # https://github.com/home-operations/tuppr/blob/main/charts/tuppr/values.yaml

  controller:
    metrics:
      enabled: true

  # Use cert-manager for webhook certificates (already installed in cluster)
  webhook:
    certManager:
      enabled: true
