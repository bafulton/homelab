apiVersion: batch/v1
kind: Job
metadata:
  name: minio-permissions-fix
  namespace: {{ .Release.Namespace }}
  annotations:
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": "-5"
    "helm.sh/hook-delete-policy": before-hook-creation
spec:
  template:
    spec:
      restartPolicy: OnFailure
      nodeSelector:
        kubernetes.io/hostname: rpi5
      containers:
        - name: fix-permissions
          image: busybox:latest
          command:
            - sh
            - -c
            - mkdir -p /mnt/minio-data && chown -R 1000:1000 /mnt/minio-data && chmod 755 /mnt/minio-data
          securityContext:
            runAsUser: 0
            runAsGroup: 0
          volumeMounts:
            - name: usb-host
              mountPath: /mnt
      volumes:
        - name: usb-host
          hostPath:
            path: /var/mnt/usb
            type: DirectoryOrCreate
