namespace: external-secrets

syncWave: "-1"

syncPolicy:
  serverSideApply: true

bitwarden:
  organizationID: b477a98e-cb7f-4b49-8fa7-af7401259de0
  projectID: e44c9c43-4e46-4d9f-8fca-b363002069d4

external-secrets:
  # A complete list of values can be found here:
  # https://github.com/external-secrets/external-secrets/blob/main/deploy/charts/external-secrets/values.yaml

  resources:
    requests:
      memory: 64Mi
      cpu: 10m
    limits:
      memory: 128Mi

  webhook:
    resources:
      requests:
        memory: 32Mi
        cpu: 10m
      limits:
        memory: 96Mi

  certController:
    resources:
      requests:
        memory: 64Mi
        cpu: 10m
      limits:
        memory: 128Mi

  bitwarden-sdk-server:
    enabled: true
    resources:
      requests:
        memory: 96Mi
        cpu: 15m
      limits:
        memory: 192Mi
