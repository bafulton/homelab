apiVersion: v1
kind: ConfigMap
metadata:
  name: signoz-sync-script
  namespace: {{ .Release.Namespace }}
data:
  sync.sh: |
    #!/bin/sh
    set -e
    apk add --no-cache curl jq git kubectl

    # Clone repo with retries (DNS failures are intermittent)
    # Plain shallow clone avoids promisor remote fetch issues with --filter=blob:none --sparse
    echo "Cloning repository..."
    for i in $(seq 1 5); do
      rm -rf /repo
      if git clone --depth 1 "$REPO_URL" /repo; then
        break
      fi
      if [ "$i" -eq 5 ]; then
        echo "ERROR: Failed to clone repository after 5 attempts"
        exit 1
      fi
      delay=$((i * 10))
      echo "  Clone attempt $i failed, retrying in ${delay}s..."
      sleep "$delay"
    done
    cd /repo

    # Wait for SigNoz to be ready
    echo "Waiting for SigNoz API to be ready..."
    for i in $(seq 1 30); do
      if curl -sf "$SIGNOZ_URL/api/v1/health" > /dev/null 2>&1; then
        echo "SigNoz API is ready"
        break
      fi
      echo "  Attempt $i/30 - waiting..."
      sleep 5
    done

    # ── Hash cache ────────────────────────────────────────────────────────────
    # Load stored hashes from the signoz-sync-hashes ConfigMap into /tmp/hashes/.
    # Each entry is a file named by key (e.g. "dash-argocd-status") containing
    # the sha256 of the last successfully synced file/content.  Only items whose
    # hash has changed are pushed to SigNoz, preventing spurious "updated"
    # notifications when nothing actually changed.
    mkdir -p /tmp/hashes
    kubectl get configmap signoz-sync-hashes -n signoz -o json 2>/dev/null | \
      jq -r '.data // {} | to_entries[] | .key + "=" + .value' 2>/dev/null | \
      while read -r entry; do
        key="${entry%%=*}"
        val="${entry#*=}"
        printf '%s' "$val" > "/tmp/hashes/$key"
      done || true

    get_hash()    { cat "/tmp/hashes/$1" 2>/dev/null || true; }
    record_hash() { printf '%s' "$2" > "/tmp/hashes/$1"; }

    # ── Dashboards ────────────────────────────────────────────────────────────
    # Track all IaC dashboard titles so we can reconcile at the end.
    # Dashboards with tag "gitops" that are NOT in this list will be deleted.
    : > /tmp/synced_dashboard_titles

    # Load dashboards (update existing or create new - preserves IDs for stable links)
    DASHBOARD_DIR="/repo/$REPO_PATH/dashboards"
    if [ -d "$DASHBOARD_DIR" ] && ls "$DASHBOARD_DIR"/*.json 1> /dev/null 2>&1; then
      echo "Loading dashboards..."

      # Get existing dashboards
      existing=$(curl -s "$SIGNOZ_URL/api/v1/dashboards" \
        -H "SIGNOZ-API-KEY: $SIGNOZ_API_TOKEN")

      for f in "$DASHBOARD_DIR"/*.json; do
        [ -f "$f" ] || continue
        name=$(basename "$f" .json)
        title=$(jq -r '.title // .data.title // empty' "$f")
        echo "$title" >> /tmp/synced_dashboard_titles

        # Skip if file content unchanged since last successful sync
        file_hash=$(sha256sum "$f" | cut -d' ' -f1)
        if [ "$(get_hash "dash-$name")" = "$file_hash" ]; then
          echo "  Skipping unchanged dashboard: $name"
          continue
        fi

        echo "  Loading dashboard: $name (title: $title)"

        # Find existing dashboard by title
        existing_id=""
        if [ -n "$title" ]; then
          existing_id=$(echo "$existing" | jq -r --arg t "$title" \
            '.data[]? | select(.data.title == $t) | .id // empty' 2>/dev/null | head -1)
        fi

        if [ -n "$existing_id" ]; then
          echo "    Updating existing dashboard: $existing_id"
          response=$(curl -s -w "\n%{http_code}" -X PUT "$SIGNOZ_URL/api/v1/dashboards/$existing_id" \
            -H "SIGNOZ-API-KEY: $SIGNOZ_API_TOKEN" \
            -H "Content-Type: application/json" \
            -d @"$f")
        else
          echo "    Creating new dashboard"
          response=$(curl -s -w "\n%{http_code}" -X POST "$SIGNOZ_URL/api/v1/dashboards" \
            -H "SIGNOZ-API-KEY: $SIGNOZ_API_TOKEN" \
            -H "Content-Type: application/json" \
            -d @"$f")
        fi

        http_code=$(echo "$response" | tail -n1)
        body=$(echo "$response" | sed '$d')

        if [ "$http_code" = "200" ] || [ "$http_code" = "201" ]; then
          echo "    Success"
          record_hash "dash-$name" "$file_hash"
        else
          echo "    Warning: HTTP $http_code - $body"
        fi
      done
    else
      echo "No dashboards found"
    fi

    # Reconcile: delete gitops-managed dashboards removed from IaC.
    # Only touches dashboards with the "gitops" tag — manually created dashboards are never deleted.
    echo "Reconciling dashboards..."
    all_dashboards=$(curl -s "$SIGNOZ_URL/api/v1/dashboards" \
      -H "SIGNOZ-API-KEY: $SIGNOZ_API_TOKEN")

    echo "$all_dashboards" | jq -c '.data[]? | select(.data.tags[]? == "gitops")' 2>/dev/null | \
    while read -r dash; do
      dash_uuid=$(echo "$dash" | jq -r '.id')
      dash_title=$(echo "$dash" | jq -r '.data.title')

      if ! grep -qxF "$dash_title" /tmp/synced_dashboard_titles 2>/dev/null; then
        echo "  Deleting removed gitops dashboard: $dash_title ($dash_uuid)"
        response=$(curl -s -w "\n%{http_code}" -X DELETE "$SIGNOZ_URL/api/v1/dashboards/$dash_uuid" \
          -H "SIGNOZ-API-KEY: $SIGNOZ_API_TOKEN")
        http_code=$(echo "$response" | tail -n1)
        if [ "$http_code" = "200" ]; then
          echo "    Deleted"
        else
          echo "    Warning: HTTP $http_code"
        fi
      fi
    done

    # ── Alerts ────────────────────────────────────────────────────────────────
    # Track all IaC alert names so we can reconcile at the end.
    # Rules with labels.source=gitops that are NOT in this list will be deleted.
    : > /tmp/synced_alert_names

    # Load alerts from ConfigMaps (label: signoz.homelab.io/alert=true)
    echo "Loading alerts from ConfigMaps..."

    # Get existing alerts
    existing_alerts=$(curl -s "$SIGNOZ_URL/api/v1/rules" \
      -H "SIGNOZ-API-KEY: $SIGNOZ_API_TOKEN")

    # List all ConfigMaps with the alert label
    kubectl get configmaps -A -l signoz.homelab.io/alert=true -o json | \
    jq -c '.items[]' | while read -r cm; do
      cm_name=$(echo "$cm" | jq -r '.metadata.name')
      cm_namespace=$(echo "$cm" | jq -r '.metadata.namespace')
      alert_json=$(echo "$cm" | jq -r '.data["alert.json"]')

      if [ -z "$alert_json" ] || [ "$alert_json" = "null" ]; then
        echo "  Warning: ConfigMap $cm_namespace/$cm_name has no alert.json"
        continue
      fi

      alert_name=$(echo "$alert_json" | jq -r '.alert // empty')
      echo "$alert_name" >> /tmp/synced_alert_names

      # Skip if content unchanged since last successful sync
      content_hash=$(printf '%s' "$alert_json" | sha256sum | cut -d' ' -f1)
      hash_key="alert-cm-$cm_namespace-$cm_name"
      if [ "$(get_hash "$hash_key")" = "$content_hash" ]; then
        echo "  Skipping unchanged alert (ConfigMap): $cm_namespace/$cm_name"
        continue
      fi

      echo "  Loading alert from ConfigMap: $cm_namespace/$cm_name (name: $alert_name)"

      # Find existing alert by name
      existing_id=""
      if [ -n "$alert_name" ]; then
        existing_id=$(echo "$existing_alerts" | jq -r --arg n "$alert_name" \
          '.data.rules[]? | select(.alert == $n) | .id // empty' 2>/dev/null | head -1)
      fi

      if [ -n "$existing_id" ]; then
        echo "    Updating existing alert: $existing_id"
        response=$(curl -s -w "\n%{http_code}" -X PUT "$SIGNOZ_URL/api/v1/rules/$existing_id" \
          -H "SIGNOZ-API-KEY: $SIGNOZ_API_TOKEN" \
          -H "Content-Type: application/json" \
          -d "$alert_json")
      else
        echo "    Creating new alert"
        response=$(curl -s -w "\n%{http_code}" -X POST "$SIGNOZ_URL/api/v1/rules" \
          -H "SIGNOZ-API-KEY: $SIGNOZ_API_TOKEN" \
          -H "Content-Type: application/json" \
          -d "$alert_json")
      fi

      http_code=$(echo "$response" | tail -n1)
      body=$(echo "$response" | sed '$d')

      if [ "$http_code" = "200" ] || [ "$http_code" = "201" ]; then
        echo "    Success"
        record_hash "$hash_key" "$content_hash"
      else
        echo "    Warning: HTTP $http_code - $body"
      fi
    done

    # Load alerts from git repo
    ALERT_DIR="/repo/$REPO_PATH/alerts"
    if [ -d "$ALERT_DIR" ] && ls "$ALERT_DIR"/*.json 1> /dev/null 2>&1; then
      echo "Loading alerts from git..."

      # Refresh existing alerts list
      existing_alerts=$(curl -s "$SIGNOZ_URL/api/v1/rules" \
        -H "SIGNOZ-API-KEY: $SIGNOZ_API_TOKEN")

      for f in "$ALERT_DIR"/*.json; do
        [ -f "$f" ] || continue
        name=$(basename "$f" .json)
        alert_name=$(jq -r '.alert // .data.alert // empty' "$f")
        echo "$alert_name" >> /tmp/synced_alert_names

        # Skip if file content unchanged since last successful sync
        file_hash=$(sha256sum "$f" | cut -d' ' -f1)
        if [ "$(get_hash "alert-$name")" = "$file_hash" ]; then
          echo "  Skipping unchanged alert: $name"
          continue
        fi

        echo "  Loading alert: $name (name: $alert_name)"

        # Find existing alert by name
        existing_id=""
        if [ -n "$alert_name" ]; then
          existing_id=$(echo "$existing_alerts" | jq -r --arg n "$alert_name" \
            '.data.rules[]? | select(.alert == $n) | .id // empty' 2>/dev/null | head -1)
        fi

        if [ -n "$existing_id" ]; then
          echo "    Updating existing alert: $existing_id"
          response=$(curl -s -w "\n%{http_code}" -X PUT "$SIGNOZ_URL/api/v1/rules/$existing_id" \
            -H "SIGNOZ-API-KEY: $SIGNOZ_API_TOKEN" \
            -H "Content-Type: application/json" \
            -d @"$f")
        else
          echo "    Creating new alert"
          response=$(curl -s -w "\n%{http_code}" -X POST "$SIGNOZ_URL/api/v1/rules" \
            -H "SIGNOZ-API-KEY: $SIGNOZ_API_TOKEN" \
            -H "Content-Type: application/json" \
            -d @"$f")
        fi

        http_code=$(echo "$response" | tail -n1)
        body=$(echo "$response" | sed '$d')

        if [ "$http_code" = "200" ] || [ "$http_code" = "201" ]; then
          echo "    Success"
          record_hash "alert-$name" "$file_hash"
        else
          echo "    Warning: HTTP $http_code - $body"
        fi
      done
    else
      echo "No alerts found in git"
    fi

    # Reconcile: delete gitops-managed alerts removed from IaC.
    # Only touches rules with labels.source == "gitops" — manually
    # created rules are never deleted.
    echo "Reconciling alerts..."
    all_rules=$(curl -s "$SIGNOZ_URL/api/v1/rules" \
      -H "SIGNOZ-API-KEY: $SIGNOZ_API_TOKEN")

    echo "$all_rules" | jq -c '.data.rules[]? | select(.labels.source == "gitops")' 2>/dev/null | \
    while read -r rule; do
      rule_id=$(echo "$rule" | jq -r '.id')
      rule_name=$(echo "$rule" | jq -r '.alert')

      if ! grep -qxF "$rule_name" /tmp/synced_alert_names 2>/dev/null; then
        echo "  Deleting removed gitops alert: $rule_name ($rule_id)"
        response=$(curl -s -w "\n%{http_code}" -X DELETE "$SIGNOZ_URL/api/v1/rules/$rule_id" \
          -H "SIGNOZ-API-KEY: $SIGNOZ_API_TOKEN")
        http_code=$(echo "$response" | tail -n1)
        if [ "$http_code" = "200" ]; then
          echo "    Deleted"
        else
          echo "    Warning: HTTP $http_code"
        fi
      fi
    done

    # ── Save hash cache ───────────────────────────────────────────────────────
    # Persist updated hashes to ConfigMap for next run.
    hashes_json='{'
    first=true
    for hf in /tmp/hashes/*; do
      [ -f "$hf" ] || continue
      key=$(basename "$hf")
      val=$(cat "$hf")
      [ "$first" = "true" ] || hashes_json="$hashes_json,"
      hashes_json="${hashes_json}\"${key}\":\"${val}\""
      first=false
    done
    hashes_json="${hashes_json}}"

    printf '{"apiVersion":"v1","kind":"ConfigMap","metadata":{"name":"signoz-sync-hashes","namespace":"signoz"},"data":%s}\n' \
      "$hashes_json" | kubectl apply -f - > /dev/null

    echo "Sync complete!"
