namespace: home-assistant

# Gateway API HTTPRoute for public and LAN access
# Routes through Traefik Gateway (Cloudflare Tunnel for public, MetalLB for LAN)
gateway-route:
  routes:
    - name: public-lan
      hostnames:
        - home.fultonhuffman.com  # Public access via Cloudflare Tunnel
        - home.local              # LAN access via mDNS
      service:
        name: home-assistant
        port: 80
      mdns:
        name: Home Assistant
        ip: 192.168.1.200
        types:
          - type: _home-assistant._tcp
          - type: _http._tcp

home-assistant:
  # Enable host networking for device auto-discovery (mDNS, SSDP, etc.)
  # Required for discovering Kasa, Meross, SwitchBot, and other LAN devices
  hostNetwork: true
  dnsPolicy: ClusterFirstWithHostNet
  # Reduce ndots from default 5 to 1 so aiodns/pycares tries the bare domain first
  # instead of exhausting three cluster search-domain variants before reaching the
  # real lookup. Fixes robovac_mqtt DNS timeout on startup for Eufy cloud auth.
  dnsConfig:
    options:
      - name: ndots
        value: "1"

  # Configuration management
  # forceInit: false — only writes configuration.yaml on first boot (when it doesn't exist).
  # After initial setup, configuration.yaml on the PVC is never overwritten by GitOps.
  # All GitOps-owned settings (http, homeassistant, prometheus, etc.) live in the
  # packages ConfigMap (files/packages/gitops_config.yaml) and are applied automatically
  # via the reloader without touching configuration.yaml.
  configuration:
    enabled: true
    forceInit: false
    templateConfig: |
      default_config:

      homeassistant:
        # Load GitOps-managed packages from ConfigMap
        packages: !include_dir_named packages

  # Recreate strategy required because hostNetwork: true means only one pod can bind port 8123
  deploymentStrategy: Recreate

  # Use Deployment with pre-provisioned PVC (managed by longhorn-storage chart)
  controller:
    type: Deployment

  # Use existing PVC created by longhorn-storage chart (has backup labels)
  persistence:
    enabled: true
    existingClaim: home-assistant-config

  # Service configuration
  # ClusterIP service - accessed via Traefik IngressRoute for LAN and Tailscale Ingress for remote
  service:
    type: ClusterIP
    port: 80

  # Prometheus metrics for SigNoz integration
  # The prometheus: config above enables the /api/prometheus endpoint
  # These annotations tell SigNoz to scrape it
  deploymentAnnotations:
    # Reloader watches home-assistant-packages ConfigMap (match: "true") and restarts on changes
    reloader.stakater.com/search: "true"

  podAnnotations:
    prometheus.io/scrape: "true"
    prometheus.io/port: "8123"
    prometheus.io/path: "/api/prometheus"

  # Startup probe - allows up to 5 minutes for Home Assistant to initialize
  # Liveness/readiness probes won't run until startup probe succeeds
  startupProbe:
    httpGet:
      path: /
      port: http
      scheme: HTTP
    initialDelaySeconds: 30
    periodSeconds: 10
    timeoutSeconds: 2
    failureThreshold: 30

  # Mount GitOps-managed packages from ConfigMap
  additionalVolumes:
    - name: packages
      configMap:
        name: home-assistant-packages
    - name: abode-patch
      configMap:
        name: abode-event-controller-patch

  additionalMounts:
    - name: packages
      mountPath: /config/packages
      readOnly: true
    - name: abode-patch
      mountPath: /usr/local/lib/python3.14/site-packages/jaraco/abode/event_controller.py
      subPath: event_controller.py
      readOnly: true

# AirCast - AirPlay bridge for Chromecast devices
# Allows streaming audio from Apple devices to Chromecast speakers
# https://github.com/1activegeek/docker-airconnect
aircast:
  enabled: true
  image:
    repository: 1activegeek/airconnect
    # renovate: datasource=docker depName=1activegeek/airconnect
    tag: "1.9.3"
    pullPolicy: IfNotPresent

# Matter Server - Controller for Matter smart home devices
# Home Assistant connects via WebSocket at ws://matter-server:5580/ws
# https://github.com/home-assistant-libs/python-matter-server
matterServer:
  enabled: true
  image:
    # Image moved from home-assistant-libs to matter-js org
    repository: ghcr.io/matter-js/python-matter-server
    # renovate: datasource=docker depName=ghcr.io/matter-js/python-matter-server
    tag: "8.1.2"
    pullPolicy: IfNotPresent
  persistence:
    storageClass: longhorn-emmc
    size: 1Gi

# Longhorn storage - PVC with backup labels and daily snapshots
longhorn-storage:
  pvcs:
    - name: home-assistant-config
      size: 5Gi
      storageClass: longhorn-emmc
      backupGroup: home-assistant
  jobs:
    - name: home-assistant-daily
      cron: "0 2 * * *"
      groups:
        - home-assistant
      retain: 5
    - name: home-assistant-backup
      task: backup
      cron: "30 2 * * *"
      groups:
        - home-assistant
      retain: 5
    # matter-server-data PVC is created by templates/matter-server.yaml with the
    # recurring-job-group.longhorn.io/matter-server label set directly on the PVC
    - name: matter-server-daily
      cron: "0 4 * * *"
      groups:
        - matter-server
      retain: 5
    - name: matter-server-backup
      task: backup
      cron: "30 4 * * *"
      groups:
        - matter-server
      retain: 3

signoz-alerts:
  alerts:
    - name: Home Assistant Down
      description: Home Assistant has no available replicas
      severity: critical
      type: promql
      query: 'max_over_time(kube_deployment_status_replicas_available{namespace="home-assistant",deployment="home-assistant"}[10m])'
      op: "<"
      threshold: 1
      evalWindow: 10m0s
      for: 5m0s

    - name: Smart Home Device Offline
      description: >-
        A smart home peripheral has been unavailable in Home Assistant for 10+
        minutes. Covers: Govee BLE sensors (H5140 CO2, H5106 PM2.5), Meross
        MTS960 thermostat, SwitchBot Hub 2 (via Matter temperature sensor),
        and Brother MFC-L2710DW printer.
      summary: "Smart home device offline: {{friendly_name}} ({{entity}})"
      severity: warning
      type: threshold
      metric: homeassistant_entity_available
      timeAggregation: max
      spaceAggregation: max
      filter: >-
        entity IN ('sensor.govee_co2_sensor_h5140_tempc',
        'sensor.govee_pm2_5_sensor_h5106_tempc',
        'climate.mts960_844f_heater_cooler',
        'sensor.hub_2_tempsensor_temperature',
        'sensor.mfc_l2710dw_status')
      groupBy:
        - entity
        - friendly_name
      legend: "{{friendly_name}}"
      op: "<"
      threshold: 1
      evalWindow: 15m0s
      matchType: "2"
