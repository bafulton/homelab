namespace: homebridge

# Homebridge UI — LAN + Tailscale private access
gateway-route:
  routes:
    - name: lan
      hostnames:
        - homebridge.local
      service:
        name: homebridge
        port: 8581
      mdns:
        name: Homebridge
        ip: 192.168.1.200
    - name: private
      hostnames:
        - homebridge.catfish-mountain.com  # Tailscale Split DNS only
      service:
        name: homebridge
        port: 8581

# HA long-lived access token from Bitwarden
bitwarden-secret:
  secrets:
    - name: homebridge-ha-token
      data:
        token: "e2fc2778-cb90-4101-9696-b449002ec62f"

# Persistent storage: plugins, accessories cache, config
longhorn-storage:
  pvcs:
    - name: homebridge-config
      size: 2Gi
      storageClass: longhorn-emmc
      backupGroup: homebridge
  jobs:
    - name: homebridge-daily
      cron: "0 2 * * *"
      groups:
        - homebridge
      retain: 5
    - name: homebridge-backup
      task: backup
      cron: "30 2 * * *"
      groups:
        - homebridge
      retain: 3

signoz-alerts:
  alerts:
    - name: Homebridge Down
      description: Homebridge has no available replicas
      severity: warning
      type: promql
      query: 'max_over_time(kube_deployment_status_replicas_available{namespace="homebridge",deployment="homebridge"}[10m])'
      op: "<"
      threshold: 1
      evalWindow: 10m0s

homebridge:
  image:
    repository: homebridge/homebridge
    # renovate: datasource=docker depName=homebridge/homebridge
    tag: "2026-05-11"
    pullPolicy: IfNotPresent
