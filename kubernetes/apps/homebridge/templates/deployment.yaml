{{- with .Values.homebridge }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: homebridge
  namespace: {{ $.Release.Namespace }}
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: homebridge
  template:
    metadata:
      labels:
        app: homebridge
    spec:
      hostNetwork: true
      dnsPolicy: ClusterFirstWithHostNet
      initContainers:
        - name: seed-config
          # Writes config.json from template on first boot only.
          # Substitutes __HA_TOKEN__ with the actual token from the Secret.
          # Subsequent pod restarts skip this (file already exists).
          image: busybox:1.36.1
          command: ["/bin/sh", "-c"]
          args:
            - |
              if [ ! -f /homebridge/config.json ]; then
                sed "s/__HA_TOKEN__/$HA_TOKEN/g" /config-template/config.json > /homebridge/config.json
                echo "Seeded config.json from template"
              else
                echo "config.json already exists, skipping"
              fi
          env:
            - name: HA_TOKEN
              valueFrom:
                secretKeyRef:
                  name: homebridge-ha-token
                  key: token
          volumeMounts:
            - name: config-template
              mountPath: /config-template
            - name: config
              mountPath: /homebridge
      containers:
        - name: homebridge
          image: {{ .image.repository }}:{{ .image.tag }}
          imagePullPolicy: {{ .image.pullPolicy }}
          ports:
            - name: http
              containerPort: 8581
              protocol: TCP
            - name: hap
              containerPort: 51826
              protocol: TCP
          env:
            - name: HOMEBRIDGE_CONFIG_UI_PORT
              value: "8581"
          volumeMounts:
            - name: config
              mountPath: /homebridge
          livenessProbe:
            httpGet:
              path: /
              port: 8581
            initialDelaySeconds: 60
            periodSeconds: 30
            failureThreshold: 5
          readinessProbe:
            httpGet:
              path: /
              port: 8581
            initialDelaySeconds: 30
            periodSeconds: 10
      volumes:
        - name: config
          persistentVolumeClaim:
            claimName: homebridge-config
        - name: config-template
          configMap:
            name: homebridge-config-template
{{- end }}
